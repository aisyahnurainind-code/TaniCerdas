<!-- ================= KALKULATOR CABAI ================= -->
<section id="kalkulator-cabai" class="py-5 bg-light">

  <div class="container">

    <div class="row justify-content-center">

      <div class="col-lg-7 col-md-9">

        <div class="card shadow-lg border-0 rounded-4">

          <div class="card-header text-center bg-danger text-white py-4 rounded-top-4">

            <h2 class="mb-1">
              🌶️ Kalkulator Kebutuhan Bibit & Pupuk Cabai
            </h2>

            <p class="mb-0">
              Hitung kebutuhan bibit dan pupuk berdasarkan luas lahan.
            </p>

          </div>

          <div class="card-body p-4">

            <div class="mb-4">

              <label for="luasLahanCabai" class="form-label fw-semibold">
                Luas Lahan (Hektar)
              </label>

              <div class="input-group input-group-lg">

                <span class="input-group-text">
                  🌶️
                </span>

                <input type="number" id="luasLahanCabai" class="form-control" placeholder="Contoh: 1" step="0.1">

                <span class="input-group-text">
                  Ha
                </span>

              </div>

            </div>

            <div class="d-grid">

              <button class="btn btn-success btn-lg" onclick="hitungKebutuhanCabai()">
                Hitung Kebutuhan
              </button>

            </div>

            <hr class="my-4">

            <div id="hasilKalkulatorCabai"></div>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>
